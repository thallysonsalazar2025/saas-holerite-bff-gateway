server:
  port: 8080

security:
  jwt:
    secret: "${JWT_SECRET}"
    expiration-seconds: 3600

spring:
  application:
    name: sboot-security-base-auth-service
  datasource:
    url: "${DB_URL}"
    driver-class-name: org.h2.Driver
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
